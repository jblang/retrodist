# Red Hat Linux 5.2 kickstart for the QEMU install image.
# Keep directives in the old installer's expected order.

# Locale and basic installer input.
lang en
keyboard us

# Use the emulated network and local CD-ROM install media.
network --bootproto static --ip 10.0.2.15 --netmask 255.255.255.0 --gateway 10.0.2.2 --nameserver 10.0.2.3
cdrom

# Initialize a blank VM disk, then create the target layout.
zerombr yes
part / --size 250
part swap --size 32
part /usr --size 500 --grow
part /tmp --size 100 --grow --maxsize 500

# Fresh install defaults for the guest.
install
mouse generic3ps/2
timezone --utc US/Eastern
rootpw password

# Basic XFree86 setup for the emulated display.
xconfig --server "SVGA" --monitor "generic multisync"

# Boot from the VM disk after installation.
lilo --location mbr

# Workstation is a built-in package profile in 5.2 and later.
%packages
@ Workstation
