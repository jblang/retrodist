# Declarative configuration for the Python retro host.

[install]
driver = "redhat-c"

[download]
cdrom = "infomagic/ldr/1997_04"

[extract]
source = "disc1.iso"
boot_image = "images/boot.img"

[qemu]
profile = "linux-2.0"

[qemu.network]
device = "pcnet"

[install.redhat]
flow = "4x"
x_card_down = 66
keyboard_after_packages = true
lilo_extra_f12 = 1

[postinst]
stages = ["x11"]
