# Declarative configuration for the Python retro host.

[install]
driver = "redhat-c"

[download]
cdrom = "infomagic/ldr/1998_06"

[extract]
source = "disc1.iso"
boot_image = "images/boot.img"

[qemu]
profile = "linux-2.0"

[install.prompts]
boot_sleep = 1

[install.redhat]
color_prompt = false
language_prompt = true
keyboard_early = true
pcmcia_prompt = false
cdrom_type_prompt = false
insert_cd_prompt = "Insert your Red Hat CD"
flow = "51"
timezone_prompt = "Configure Timezones"
lilo_extra_f12 = 1
bootdisk_prompt = true

[postinst]
stages = ["x11"]

[postinst.x11]
chipset = "clgd5446"
