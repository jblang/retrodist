# Declarative configuration for the Python retro host.

[install]
driver = "redhat-c"

[download]
cdrom = "infomagic/ldr/1996_12"

[extract]
source = "disc1.iso"
boot_image = "images/boot.img"

[qemu]
profile = "linux-2.0"

[qemu.network]
device = "pcnet"

[install.prompts]
boot_prompt = "LILO boot:"

[install.redhat]
flow = "4x"
x_card_down = 24
keyboard_late = true

[postinst]
stages = ["x11"]
