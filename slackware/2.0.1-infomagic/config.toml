# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
root_prompt = "Please remove the boot kernel disk from your floppy drive, insert a"
continuation_prompt = "VFS: Insert root floppy and press ENTER"

[download]
cdrom = "infomagic/ldr/1994_10"

[extract]
source = "disc1.iso"
boot_image = "distributions/slakinst/boot144/bare.gz"
root_image = "distributions/slakinst/root144/color144.gz"
package_source = "distributions/slackware"
boot_link = "bare"
root_link = "color144"
decompress = ["bare.gz", "color144.gz"]
truncate = ["bare", "color144"]

[qemu]
profile = "linux-1.0"

[install.slackware]
source = "/dev/hdb1"

[postinst]
stages = ["tty", "x11"]
