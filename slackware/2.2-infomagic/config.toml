# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
root_prompt = "VFS: Insert ramdisk floppy and press ENTER"

[download]
cdrom = "infomagic/ldr/1995_03"

[extract]
source = "disc1.iso"
boot_image = "slakinst/boot144/bare"
root_image = "slakinst/root144/color144"
package_source = "slakware"

[qemu]
profile = "linux-1.2"

[install.slackware]
source = "/dev/hdb1"

[postinst]
stages = ["tty", "x11"]
