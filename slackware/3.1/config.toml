# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
root_prompt = "VFS: Insert root floppy disk to be loaded into ramdisk and press ENTER"

[qemu]
profile = "linux-2.0"

[qemu.network]
device = "ne2k_isa"

[postinst]
stages = ["modules", "tty", "x11"]

[postinst.modules]
enable = "ne io=0x300"
