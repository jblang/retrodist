# Declarative configuration for the Python retro host.

[[download.files]]
path = "slackware.tar.gz"
url = "https://archive.org/download/slackware-beta/slack-pre1.0.tar.gz"

[extract]
source = "slackware.tar.gz"
boot_image = "slack-pre1.0/a1.img"
package_source = "slack-pre1.0"
package_dest = "install"
