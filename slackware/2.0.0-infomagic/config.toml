# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
root_prompt = "Please remove the boot kernel disk from your floppy drive, insert a"
continuation_prompt = "VFS: Insert root floppy and press ENTER"

[download]
cdrom = "infomagic/ldr/1994_06"

[extract]
source = "disc1.iso"
boot_image = "slakinst/boot144/bare"
root_image = "slakinst/root144/color144"
packages = "slakware"

[qemu]
profile = "linux-1.0"

[install.slackware]
source = "/dev/hdb1"

[postinst]
stages = ["tty", "x11"]
