# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
root_prompt = "VFS: Insert root floppy disk to be loaded into ramdisk and press ENTER"

[download]
slackware_mirror = "3.6"

[extract]
boot_image = "slackware-3.6/bootdsks.144/bare.i"
root_image = "slackware-3.6/rootdsks/color.gz"
packages = "slackware-3.6/slakware"
truncate = ["bare.i"]

[install.slackware]
source = "/dev/hdb1"
