# Declarative configuration for the Python retro host.

[install]
driver = "slackware-pkgtool"

[install.boot]
boot_prompt = false
root_prompt = "Please remove the boot kernel disk from your floppy drive,"
continuation_prompt = "VFS: Insert root floppy and press ENTER"

[download]
slackware_mirror = "1.1.2"

[extract]
boot_image = "slackware-1.1.2/bootdisk/1_44meg/bareboot.gz"
root_image = "slackware-1.1.2/bootdisk/1_44meg/color144.gz"
package_source = "slackware-1.1.2"
boot_link = "bareboot"
root_link = "color144"
decompress = ["bareboot.gz", "color144.gz"]

[qemu]
profile = "linux-1.0"

[qemu.network]
device = "ne2k_isa,iobase=0x280"

[install.slackware]
setup_hostname = "darkstar"
source = "/dev/hdb1"
tagfile_path = false
source_before_target = true
simple_lilo = true

[postinst]
stages = ["tty", "x11"]
