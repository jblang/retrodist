# Declarative configuration for the Python retro host.

[download]
debian_mirror = "buzz"

[extract]
boot_image = "buzz/main/disks-i386/1996_6_16/boot1440.bin"
root_image = "buzz/main/disks-i386/1996_6_16/root.bin"
extra_images = ["buzz/main/disks-i386/1996_6_16/base14-*.bin"]
fat_files = ["buzz/main/disks-i386/1996_6_16/base1_1.tgz"]

[[extract.image_extracts]]
image = "boot.img"
members = ["MODULES.TGZ"]
destination = "fat/bootflop"
lowercase = true

[[extract.archive_extracts]]
archive = "fat/bootflop/modules.tgz"
members = ["lib/modules/*/misc/serial.o"]
destination = "fat"
flatten = true
