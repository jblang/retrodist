# Declarative configuration for the Python retro host.

[install]
driver = "debian-dinstall"

[install.boot]
root_prompt = "VFS: Insert root floppy disk to be loaded into ramdisk and press ENTER"

[qemu]
profile = "linux-2.0"

[qemu.network]
device = "ne2k_isa"

[qemu.serial]
auxiliary = "msmouse"

[qemu.disk]
size = "2G"

[install.network]
hostname = "buzz"
net_module = "ne"
net_module_args = "io=0x300 irq=9"

[install.locale]
keymap = ""

[install.debian]
configure_keyboard = true
kernel_floppy = "boot.img"
driver_floppy = false
relogin = true

[postinst]
stages = ["packages", "x11"]

[postinst.packages]
priorities = ["important"]
add = [
    "libc5-dev", # Perl 5.003's postinst assumes libc5-dev headers are installed.
    "xbase",
    "xserver-svga",
    "xfntbase",
    "xfntscl",
    "xfntpex",
    "xfntbig",
    "xfnt100",
    "xfnt75",
    "m4",
    "xpm4.7",
    "fvwm",
]

[[postinst.packages.prompts]]
# Dinstall already configured LILO; retain that configuration unchanged.
expect = "Install a boot block using your current LILO configuration? [No]"
answer = "n"

[[postinst.packages.prompts]]
expect = "Wipe out your old LILO configuration and make a new one? [No]"
answer = "n"

[[postinst.packages.prompts]]
# Do not start an unconfigured X display manager at boot.
expect = "Would you like xdm to be started at boot time? (y/n) [y]"
answer = "n"

[[postinst.packages.prompts]]
expect = "Do you want to make the SVGA X server the default? (y/n) [y]"
answer = "y"

[[postinst.packages.prompts]]
# Leave interactive XF86Config creation for a later dedicated configuration.
expect = "Do you want to create the XFree86 configuration file? (y/n) [y]"
answer = "n"

[[postinst.packages.prompts]]
# Smail asks for the selection on its following input line (default 1).
expect = "Enter value (default=`1', `x' to restart):"
answer = "4"

[[postinst.packages.prompts]]
expect = "Enter value (default=`debian', `x' to restart):"
answer = ""

[[postinst.packages.prompts]]
expect = "Is this OK ?  Hit Return or type `y' to confirm it and install,"
answer = "y"

[[postinst.packages.prompts]]
expect = "Send a test message now ?  (y/n)"
answer = "n"

[postinst.x11]
mouse_device = "/dev/ttyS2"
