[download]
cdrom = "infomagic/ldr/1994_06"

[extract]
source = "disc1.iso"
package_source = "distributions/debian/dist/packages"
boot_link = "bootdisk"
extra_images = ["distributions/debian/dist/base/bootdisk.gz", "distributions/debian/dist/base/basedsk1.gz", "distributions/debian/dist/base/basedsk2.gz"]
decompress = ["*.gz"]

[qemu]
profile = "linux-0.99"

[qemu.serial]
auxiliary = "msmouse"

[install]
driver = "prompt-sequence"
default_transport = "vga"

[install.disk]
target_disk = "/dev/hda"
swap_mb = 64
swap_partition = "hda1"
linux_partition = "hda2"
fat_partition = "/dev/hdb1"
fat_mount = "/retro"

[install.network]
hostname = "debra"
domain = "retro.net"
ip = "10.0.2.15"
network = "10.0.2.0"
broadcast = "10.0.2.255"
gateway = "10.0.2.2"
netmask = "255.255.255.0"
nameserver = "10.0.2.3"

[install.locale]
timezone = "US/Central"

[install.debian]
modem_port = 5
mouse_type = 1
mouse_port = 3
mouse_protocol = 1

[postinst]
custom_script = "postinst.sh"
stages = ["custom", "tty", "x11"]

[postinst.x11]
mouse_device = "/dev/ttyS2"

[[install.steps]]
action = "wait"
text = "boot:"
match = "line"

[[install.steps]]
action = "type"
text = "\n"

[[install.steps]]
action = "wait"
text = "#"
match = "line"

[[install.steps]]
action = "serial-shell-start"

[[install.steps]]
action = "partition"

[[install.steps]]
action = "wait"
transport = "serial"
text = "#"
match = "line"

[[install.steps]]
action = "serial-shell-exit"

[[install.steps]]
action = "type"
text = "dinstall\n"

[[install.steps]]
action = "prompt"
questions = ["2   Initialize and activate your swap partition(s)"]
answer = "2"

[[install.steps]]
action = "prompt"
questions = ["What is the name of your swap partition"]
answer = "${install.disk.swap_partition}"

[[install.steps]]
action = "prompt"
questions = ["Would you like to check for bad blocks (y/n) [y]?"]
answer = "n"

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]

[[install.steps]]
action = "prompt"
questions = ["3   Format your Linux native partition(s) with mke2fs"]
answer = "3"

[[install.steps]]
action = "prompt"
questions = ["On which partition do you wish to create an ext2 filesystem?"]
answer = "${install.disk.linux_partition}"

[[install.steps]]
action = "prompt"
questions = ["Would you like to check for bad blocks (y/n) [y]?"]
answer = "n"

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]

[[install.steps]]
action = "prompt"
questions = ["5   Install the Debian Linux base system"]
answer = "5"

[[install.steps]]
action = "prompt"
questions = ["Continue with the installation of the base system (y/n) [y]?"]
answer = "y"

[[install.steps]]
action = "prompt"
questions = ["(m)ount another filesystem, (u)nmount a mounted filesystem,", "or (c)ontinue with the installation:"]
answer = "m"

[[install.steps]]
action = "prompt"
questions = ["Mount which filesystem (ex: /dev/hda3)? /dev/"]
answer = "${install.disk.linux_partition}"

[[install.steps]]
action = "prompt"
questions = ["Mount /dev/${install.disk.linux_partition} on which directory (ex: /usr)? /root/"]

[[install.steps]]
action = "prompt"
questions = ["(m)ount another filesystem, (u)nmount a mounted filesystem,", "or (c)ontinue with the installation:"]
answer = "c"

[[install.steps]]
action = "prompt"
questions = ["Please specify /dev/fd0 or /dev/fd1 [/dev/fd0]: /dev/"]
answer = "fd0"

[[install.steps]]
action = "wait"
text = "Please insert basedisk #1 into /dev/fd0 and press <RETURN>:"

[[install.steps]]
action = "change-floppy"
image = "basedsk1"

[[install.steps]]
action = "press"
keys = "ret"

[[install.steps]]
action = "wait"
text = "Please insert basedisk #2 into /dev/fd0 and press <RETURN>:"

[[install.steps]]
action = "change-floppy"
image = "basedsk2"

[[install.steps]]
action = "press"
keys = "ret"

[[install.steps]]
action = "prompt"
questions = ["Which partition contains your root filesystem? /dev/"]
answer = "${install.disk.linux_partition}"

[[install.steps]]
action = "prompt"
questions = ["Which partition is your swap partition (<RETURN> for none)? /dev/"]
answer = "${install.disk.swap_partition}"

[[install.steps]]
action = "prompt"
questions = ["What is the unqualified hostname of your machine?"]
answer = "${install.network.hostname}"

[[install.steps]]
action = "prompt"
questions = ["What is the local domainname without the leading `.'?"]
answer = "${install.network.domain}"

[[install.steps]]
action = "prompt"
questions = ["Your fully-qualified hostname is .* Correct \\(y/n\\)?"]
answer = "y"
regex = true

[[install.steps]]
action = "prompt"
questions = ["Does your machine require additional networking setup (y/n)?"]
answer = "y"

[[install.steps]]
action = "prompt"
questions = ["What is the IP address of your machine?"]
answer = "${install.network.ip}"

[[install.steps]]
action = "prompt"
questions = ["What is your netmask?"]
answer = "${install.network.netmask}"

[[install.steps]]
action = "prompt"
questions = ["What is your network address?"]
answer = "${install.network.network}"

[[install.steps]]
action = "prompt"
questions = ["What is your broadcast address (if you don't have one, type `none')?"]
answer = "${install.network.broadcast}"

[[install.steps]]
action = "prompt"
questions = ["What is your gateway address?"]
answer = "${install.network.gateway}"

[[install.steps]]
action = "prompt"
questions = ["What is the address of your nameserver (if your machine is the name server,", "enter 127.0.0.1; if you don't have one, type `none')?"]
answer = "${install.network.nameserver}"

[[install.steps]]
action = "prompt"
questions = ["Is this correct (y/n)?"]
answer = "y"

[[install.steps]]
action = "prompt"
questions = ["Do you have an ethernet connection (y/n)?"]
answer = "y"

[[install.steps]]
action = "prompt"
questions = ["Is your system clock set to GMT?"]
answer = "y"

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> for more..."]

[[install.steps]]
action = "prompt"
questions = ["Which timezone?"]
answer = "${install.locale.timezone}"

[[install.steps]]
action = "prompt"
questions = ["Load a non-US keymap at boot time (y/n)?"]
answer = "n"

[[install.steps]]
action = "prompt"
questions = ["Which port contains your modem (if you have one)?"]
answer = "${install.debian.modem_port}"

[[install.steps]]
action = "prompt"
questions = ["Which type of mouse do you have (if you have one)?"]
answer = "${install.debian.mouse_type}"

[[install.steps]]
action = "prompt"
questions = ["Which port contains your mouse?"]
answer = "${install.debian.mouse_port}"

[[install.steps]]
action = "prompt"
questions = ["What type of serial mouse do you have?"]
answer = "${install.debian.mouse_protocol}"

[[install.steps]]
action = "prompt"
questions = ["Would you like to make a custom bootdisk before proceeding (y/n)?"]
answer = "n"

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]

[[install.steps]]
action = "prompt"
questions = ["7   Return to the shell"]
answer = "7"

[[install.steps]]
action = "wait"
text = "#"
match = "line"

[[install.steps]]
action = "serial-shell-start"

[[install.steps]]
action = "serial-shell-send"
command = [
    '/root/usr/sbin/rdev /root/vmlinuz /dev/${install.disk.linux_partition}',
    '/root/usr/sbin/rdev -R /root/vmlinuz 1',
    '/root/usr/sbin/rdev -v /root/vmlinuz -1',
    'sed "s|/dev/hda3|/dev/${install.disk.linux_partition}|g" /root/etc/lilo.conf | sed "s|read-only|#read-only|g" | sed "s|delay=20|#delay=20|g" >/root/tmp/lilo.conf',
    'mv /root/tmp/lilo.conf /root/etc/lilo.conf',
    '/root/sbin/lilo -r /root -C /etc/lilo.conf',
]

[[install.steps]]
action = "serial-shell-exit"

[[install.steps]]
action = "set-boot"
device = "c"

[[install.steps]]
action = "type"
text = "reboot\n"

[[install.steps]]
action = "run-postinst"
login = "${install.network.hostname}.${install.network.domain} login:"
shell = "[root:~]#"
