# Declarative configuration for the Python retro host.

[install]
driver = "prompt-sequence"

[download]
cdrom = "infomagic/ldr/1994_06"

[extract]
source = "disc1.iso"
package_source = "distributions/debian/dist/packages"
boot_link = "bootdisk"
extra_images = ["distributions/debian/dist/base/bootdisk.gz", "distributions/debian/dist/base/basedsk1.gz", "distributions/debian/dist/base/basedsk2.gz"]
decompress = ["*.gz"]

[qemu]
profile = "linux-0.99"

[qemu.serial]
auxiliary = "msmouse"

[install.disk]
target_disk = "/dev/hda"
swap_mb = 64
swap_partition = "hda1"
linux_partition = "hda2"
fat_partition = "/dev/hdb1"
fat_mount = "/retro"

[install.network]
hostname = "debra"
domain = "retro.net"
ip = "10.0.2.15"
network = "10.0.2.0"
broadcast = "10.0.2.255"
gateway = "10.0.2.2"
netmask = "255.255.255.0"
nameserver = "10.0.2.3"

[install.locale]
timezone = "US/Central"

[install.debian]
modem_port = 5
mouse_type = 1
mouse_port = 3
mouse_protocol = 1

[postinst]
custom_script = "postinst.sh"
stages = ["custom", "tty", "x11"]

[postinst.x11]
mouse_device = "/dev/cua2"

[[install.steps]]
action = "wait"
transport = "vga"
text = "boot:"
match = "line"

[[install.steps]]
action = "type"
text = "\n"

[[install.steps]]
action = "wait"
transport = "vga"
text = "#"
match = "line"

[[install.steps]]
action = "serial-shell-start"

[[install.steps]]
action = "serial-shell-send"
command = "for p in /bin/tput /usr/bin/tput /usr/local/bin/tput; do if [ -f $p ]; then mv $p $p.real; echo exit 0 >$p; chmod 755 $p; fi; done"

[[install.steps]]
action = "partition"

[[install.steps]]
action = "wait"
transport = "serial"
text = "#"
match = "line"

[[install.steps]]
action = "console-echo"
text = "Starting Debian setup; base installation may take a while..."

[[install.steps]]
action = "serial-shell-send"
command = "dinstall"
wait = false

[[install.steps]]
action = "prompt"
questions = ["Please select one:"]
answer = "2"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is the name of your swap partition"]
answer = "${install.disk.swap_partition}"
regex = true

[[install.steps]]
action = "prompt"
questions = ["Would you like to check for bad blocks (y/n) [y]?"]
answer = "n"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]
answer = ""
regex = false

[[install.steps]]
action = "prompt"
questions = ["Please select one:"]
answer = "3"
regex = false

[[install.steps]]
action = "prompt"
questions = ["On which partition do you wish to create an ext2 filesystem?"]
answer = "${install.disk.linux_partition}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Would you like to check for bad blocks (y/n) [y]?"]
answer = "n"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]
answer = ""
regex = false

[[install.steps]]
action = "prompt"
questions = ["Please select one:"]
answer = "5"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Continue with the installation of the base system (y/n) [y]?"]
answer = "y"
regex = false

[[install.steps]]
action = "prompt"
questions = ["or (c)ontinue with the installation:"]
answer = "m"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Mount which filesystem (ex: /dev/hda3)? /dev/"]
answer = "${install.disk.linux_partition}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Mount /dev/${install.disk.linux_partition} on which directory (ex: /usr)? /root/"]
answer = ""
regex = false

[[install.steps]]
action = "prompt"
questions = ["or (c)ontinue with the installation:"]
answer = "c"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Please specify /dev/fd0 or /dev/fd1 [/dev/fd0]: /dev/"]
answer = ""
regex = false

[[install.steps]]
action = "wait"
transport = "serial"
text = "Please insert basedisk #1 into /dev/fd0 and press <RETURN>:"
match = "line"

[[install.steps]]
action = "change-floppy"
image = "basedsk1"

[[install.steps]]
action = "serial-send"
text = ""

[[install.steps]]
action = "wait"
transport = "serial"
text = "Please insert basedisk #2 into /dev/fd0 and press <RETURN>:"
match = "line"

[[install.steps]]
action = "change-floppy"
image = "basedsk2"

[[install.steps]]
action = "serial-send"
text = ""

[[install.steps]]
action = "prompt"
questions = ["Which partition contains your root filesystem? /dev/"]
answer = "${install.disk.linux_partition}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Which partition is your swap partition (<RETURN> for none)? /dev/"]
answer = "${install.disk.swap_partition}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is the unqualified hostname of your machine?"]
answer = "${install.network.hostname}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is the local domainname"]
answer = "${install.network.domain}"
regex = true

[[install.steps]]
action = "prompt"
questions = ["Your fully-qualified hostname is .* Correct \\(y/n\\)?"]
answer = "y"
regex = true

[[install.steps]]
action = "prompt"
questions = ["Does your machine require additional networking setup (y/n)?"]
answer = "y"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is the IP address of your machine?"]
answer = "${install.network.ip}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is your netmask?"]
answer = "${install.network.netmask}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is your network address?"]
answer = "${install.network.network}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is your broadcast address"]
answer = "${install.network.broadcast}"
regex = true

[[install.steps]]
action = "prompt"
questions = ["What is your gateway address?"]
answer = "${install.network.gateway}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What is the address of your nameserver"]
answer = "${install.network.nameserver}"
regex = true

[[install.steps]]
action = "prompt"
questions = ["Is this correct (y/n)?"]
answer = "y"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Do you have an ethernet connection (y/n)?"]
answer = "y"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Is your system clock set to GMT?"]
answer = "y"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> for more"]
answer = ""
regex = true

[[install.steps]]
action = "prompt"
questions = ["Which timezone?"]
answer = "${install.locale.timezone}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Load a non-US keymap at boot time (y/n)?"]
answer = "n"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Which port contains your modem (if you have one)?"]
answer = "${install.debian.modem_port}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Which type of mouse do you have (if you have one)?"]
answer = "${install.debian.mouse_type}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Which port contains your mouse?"]
answer = "${install.debian.mouse_port}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["What type of serial mouse do you have?"]
answer = "${install.debian.mouse_protocol}"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Would you like to make a custom bootdisk before proceeding (y/n)?"]
answer = "n"
regex = false

[[install.steps]]
action = "prompt"
questions = ["Press <RETURN> to continue..."]
answer = ""
regex = false

[[install.steps]]
action = "prompt"
questions = ["Please select one:"]
answer = "7"
regex = false

[[install.steps]]
action = "wait"
transport = "serial"
text = "#"
match = "line"

[[install.steps]]
action = "serial-shell-send"
command = "mkdir -p ${install.disk.fat_mount} && mount -t msdos ${install.disk.fat_partition} ${install.disk.fat_mount}"

[[install.steps]]
action = "serial-shell-send"
command = "sh ${install.disk.fat_mount}/guestlib.d/deb091/lilo.sh /dev/${install.disk.linux_partition} /root"

[[install.steps]]
action = "serial-shell-send"
command = "umount ${install.disk.fat_mount}"

[[install.steps]]
action = "set-boot"
device = "c"

[[install.steps]]
action = "console-echo"
text = "Rebooting..."

[[install.steps]]
action = "serial-shell-send"
command = "reboot"
wait = false

[[install.steps]]
action = "run-postinst"
login = "${install.network.hostname}.${install.network.domain} login:"
shell = "[root:~]#"
