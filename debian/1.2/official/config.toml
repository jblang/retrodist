# Declarative configuration for the Python retro host.

[download]
debian_mirror = "rex"

[extract]
boot_image = "rex/main/disks-i386/current/resq1440.bin"
root_image = "rex/main/disks-i386/current/root.bin"
extra_images = ["rex/main/disks-i386/current/drv1440.bin", "rex/main/disks-i386/current/base14-*.bin"]
fat_files = ["rex/main/disks-i386/current/base1_2.tgz"]
custom_script = "extract.sh"
