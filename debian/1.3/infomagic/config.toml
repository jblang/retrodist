# Declarative configuration for the Python retro host.

[download]
cdrom = "infomagic/ldr/1997_08"

[extract]
source = "disc3.iso"
boot_image = "bo/disks-i386/1997-05-30/resc1440.bin"
root_image = "bo/disks-i386/1997-05-30/root.bin"
extra_images = ["bo/disks-i386/1997-05-30/drv1440.bin", "bo/disks-i386/1997-05-30/base-*.bin"]
fat_files = ["bo/disks-i386/1997-05-30/base1_3.tgz", "bo/disks-i386/1997-05-30/resc1440.bin", "bo/disks-i386/1997-05-30/drv1440.bin"]
package_index = "bo/binary-i386/Packages.gz"
custom_script = "extract.sh"

[postinst.packages]
roots = ["/cdrom/bo/binary-i386", "/cdrom/bo/binary-all"]

[postinst.packages.mount]
device = "/dev/hdc"
point = "/cdrom"
filesystem = "iso9660"
